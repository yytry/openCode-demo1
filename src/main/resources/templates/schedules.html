<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>日程管理</title>
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">日程管理</h1>
    
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">新增日程</h5>
            <form action="/schedules/add" method="post" class="row g-3">
                <div class="col-md-4">
                    <input type="text" name="event" class="form-control" placeholder="日程事项 *" required>
                </div>
                <div class="col-md-3">
                    <input type="text" name="personnel" class="form-control" placeholder="参与人员">
                </div>
                <div class="col-md-2">
                    <input type="date" name="startTime" class="form-control" placeholder="开始日期">
                </div>
                <div class="col-md-2">
                    <input type="date" name="endTime" class="form-control" placeholder="结束日期">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">添加</button>
                </div>
                <div class="col-12">
                    <input type="text" name="comment" class="form-control" placeholder="备注">
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title">日程列表</h5>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>日程事项</th>
                        <th>参与人员</th>
                        <th>开始日期</th>
                        <th>结束日期</th>
                        <th>备注</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="schedule : ${schedules}">
                        <td th:text="${schedule.serialNo}"></td>
                        <td th:text="${schedule.event}"></td>
                        <td th:text="${schedule.personnel ?: '-'}"></td>
                        <td th:text="${schedule.startTime ?: '-'}"></td>
                        <td th:text="${schedule.endTime ?: '-'}"></td>
                        <td th:text="${schedule.comment ?: '-'}"></td>
                        <td>
                            <form th:action="@{/schedules/delete/{id}(id=${schedule.serialNo})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('确定删除?')">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(schedules)}" class="text-center text-muted py-4">
                暂无日程，请添加
            </div>
        </div>
    </div>
    
    <div class="mt-3">
        <a href="/labels" class="btn btn-outline-secondary">前往标签管理</a>
    </div>
</div>
</body>
</html>
